name: Attach desktop extension bundle to releases

on:
  release:
    types: [published]

jobs:
  pack-and-upload:
    name: Pack litmus-mcp.mcpb and attach to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: desktop-extension
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: Install runtime dependencies
        run: npm install --omit=dev

      - name: Pack extension
        run: npx --yes @anthropic-ai/mcpb pack . litmus-mcp.mcpb

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" litmus-mcp.mcpb --clobber
